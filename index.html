<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Feedback Form</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>User Feedback</h1>

    <form id="feedback-form">

        <label> Name</label>
        <input type="text" id="name">
        <small class="tooltip"> Enter your full name</small>

        <label> Email</label>
        <input type="email" id="email">
        <small class="tooltip"> Enter your email address</small>


        <label>Comments</label>
        <textarea id="comments"></textarea>
        <small class="tooltip"> Enter your feedback</small>

        <p> Characters: <span id="char-count">0</span></p>

        <button type="submit">Submit</button>

    </form>

    <div id="feedback-display"></div>

 <script src="cp_1.js"></script>

</body>
</html>
